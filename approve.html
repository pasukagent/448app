<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อนุมัติสมาชิก — 448 Wealth Management Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCrHFBs56sJCT-WX6daZT1Br1vYYNclGD4",
      authDomain: "app-d83ab.firebaseapp.com",
      projectId: "app-d83ab",
      storageBucket: "app-d83ab.firebasestorage.app",
      messagingSenderId: "2200674251",
      appId: "1:2200674251:web:0b240a123df2e5b86ea04e"
    });
    const db = firebase.firestore();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: white; border-radius: 16px; padding: 40px 36px; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,.1); text-align: center; }
    .logo { font-size: 2.5rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    .sub { color: #666; font-size: .93rem; margin-bottom: 28px; }
    .btn { display: inline-block; padding: 12px 32px; border-radius: 10px; font-family: 'Sarabun', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; width: 100%; margin-top: 12px; }
    .btn-primary { background: #D0021B; color: white; }
    .btn-primary:hover { background: #a8001a; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .msg { padding: 14px 18px; border-radius: 10px; font-size: .93rem; margin-bottom: 16px; line-height: 1.6; }
    .msg-success { background: #e6f4ea; color: #1a7f3c; border: 1px solid #1a7f3c; }
    .msg-error   { background: #fff0f0; color: #c0021b; border: 1px solid #ffb3b3; }
    .msg-info    { background: #e8f0fe; color: #1a56db; border: 1px solid #93c5fd; }
    .user-info { background: #f8f9fa; border-radius: 10px; padding: 16px; margin-bottom: 16px; text-align: left; font-size: .92rem; line-height: 1.9; }
    .user-info span { font-weight: 700; color: #1a1a2e; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h1>อนุมัติสมาชิกใหม่</h1>
  <p class="sub">448 Wealth Management Plan</p>
  <div id="content">
    <div class="msg msg-info">กำลังตรวจสอบข้อมูล...</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const uid    = params.get('uid');
  const token  = params.get('token');
  const el     = document.getElementById('content');

  function show(cls, html, showBtn) {
    el.innerHTML = `<div class="msg ${cls}">${html}</div>` +
      (showBtn ? `<button class="btn btn-primary" id="btn-approve">✅ อนุมัติสมาชิกนี้</button>` : '');
    if (showBtn) document.getElementById('btn-approve').onclick = doApprove;
  }

  async function init() {
    if (!uid || !token) { show('msg-error', '❌ ลิงก์ไม่ถูกต้อง หรือหมดอายุแล้ว'); return; }
    try {
      const doc = await db.collection('users').doc(uid).get();
      if (!doc.exists) { show('msg-error', '❌ ไม่พบข้อมูลสมาชิกนี้ในระบบ'); return; }
      const d = doc.data();
      if (d.approved === true) { show('msg-success', '✅ สมาชิกนี้ได้รับการอนุมัติแล้ว'); return; }
      if (d.approveToken !== token) { show('msg-error', '❌ Token ไม่ถูกต้อง ลิงก์นี้ใช้ไม่ได้'); return; }
      el.innerHTML = `
        <div class="user-info">
          ชื่อ: <span>${d.firstName} ${d.lastName}</span><br>
          อีเมล: <span>${d.email}</span><br>
          สมัครเมื่อ: <span>${new Date(d.createdAt).toLocaleString('th-TH-u-ca-gregory')}</span>
        </div>
        <button class="btn btn-primary" id="btn-approve">✅ อนุมัติสมาชิกนี้</button>
      `;
      document.getElementById('btn-approve').onclick = doApprove;
    } catch(e) {
      show('msg-error', '❌ เกิดข้อผิดพลาด: ' + e.message);
    }
  }

  async function doApprove() {
    const btn = document.getElementById('btn-approve');
    btn.textContent = 'กำลังอนุมัติ...'; btn.disabled = true;
    try {
      await db.collection('users').doc(uid).update({ approved: true, approveToken: null });
      el.innerHTML = `<div class="msg msg-success">✅ อนุมัติเรียบร้อยแล้ว!<br>สมาชิกสามารถเข้าใช้งานได้ทันที</div>`;
    } catch(e) {
      btn.textContent = '✅ อนุมัติสมาชิกนี้'; btn.disabled = false;
      el.insertAdjacentHTML('afterbegin', `<div class="msg msg-error">❌ เกิดข้อผิดพลาด: ${e.message}</div>`);
    }
  }

  init();
</script>
</body>
</html>
