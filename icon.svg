<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Red rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#D0021B"/>
  <!-- Inner subtle gradient ring -->
  <rect x="24" y="24" width="464" height="464" rx="80" ry="80"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- "448" big white text — bold geometric -->
  <text x="256" y="296"
        font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="200" font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-6">448</text>
  <!-- "WEALTH" tagline below -->
  <text x="256" y="370"
        font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="42" font-weight="700"
        fill="rgba(255,255,255,0.85)"
        text-anchor="middle"
        letter-spacing="6">WEALTH</text>
</svg>
