<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2D4F"/>
      <stop offset="1" stop-color="#0F1A2F"/>
    </linearGradient>
  </defs>
  <!-- Navy rounded square background with gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#navyGrad)"/>
  <!-- Inner subtle gold ring -->
  <rect x="26" y="26" width="460" height="460" rx="80" ry="80"
        fill="none" stroke="#C9A961" stroke-opacity="0.6" stroke-width="2"/>
  <!-- "448" big gold text -->
  <text x="256" y="296"
        font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="200" font-weight="900"
        fill="#C9A961"
        text-anchor="middle"
        letter-spacing="-6">448</text>
  <!-- "PRESTIGE" tagline below -->
  <text x="256" y="370"
        font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="38" font-weight="700"
        fill="#C9A961"
        fill-opacity="0.88"
        text-anchor="middle"
        letter-spacing="6">PRESTIGE</text>
</svg>
